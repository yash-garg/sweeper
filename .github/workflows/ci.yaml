name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Newest resolvable analyzer, and the lowest we claim to support.
        analyzer: [default, 10.0.0]
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Pin analyzer lower bound
        if: matrix.analyzer != 'default'
        run: |
          printf 'dependency_overrides:\n  analyzer: %s\n  test: 1.29.0\n' "${{ matrix.analyzer }}" > pubspec_overrides.yaml

      - run: nix develop -c dart pub get

      - name: Analyze
        if: matrix.analyzer == 'default'
        run: nix develop -c dart analyze --fatal-infos

      - name: Check formatting
        if: matrix.analyzer == 'default'
        run: nix develop -c dart format --set-exit-if-changed lib bin test/*.dart

      - name: Run tests
        run: nix develop -c dart test
